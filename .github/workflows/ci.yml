name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  frontend:
    name: Frontend Build + Test + Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AIMedical/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: AIMedical/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ===== CI 门禁 2: 前端单测显式触发 (此前缺失) =====
      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Build workspaces
        run: npm run build:all

      # ===== CI 门禁 2: 覆盖率报告归档 (供 PR review 查看) =====
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: AIMedical/frontend/**/coverage/
          if-no-files-found: ignore

  backend:
    name: Backend Test + Coverage + Contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AIMedical/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # ===== Guard: 确保有源码的子模块都显式启用了 JaCoCo 且未跳过覆盖率检查 =====
      # 父 POM 默认 jacoco.skip=true / jacoco.skip.check=true, 子模块须覆盖为 false;
      # 此步骤在 mvn verify 之前快速检查, 避免静默缺失覆盖率门禁.
      - name: "Guard: all modules with Java sources must enable JaCoCo"
        run: |
          status=0
          for pom in */pom.xml modules/*/pom.xml; do
            dir="${pom%/pom.xml}"
            [ -d "$dir/src/main/java" ] || continue
            if grep -q '<jacoco.skip>false</jacoco.skip>' "$pom"; then
              echo "  PASS  [jacoco.skip]  $pom"
            else
              echo "  FAIL  [jacoco.skip]  $pom  (has src/main/java but missing <jacoco.skip>false</jacoco.skip>)"
              status=1
            fi
            if grep -q '<jacoco.skip.check>false</jacoco.skip.check>' "$pom"; then
              echo "  PASS  [jacoco.skip.check]  $pom"
            else
              echo "  FAIL  [jacoco.skip.check]  $pom  (has src/main/java but missing <jacoco.skip.check>false</jacoco.skip.check>)"
              status=1
            fi
          done
          [ "$status" -eq 0 ] || exit 1

      # ===== CI 门禁 1: 显式 mvn verify (含 jacoco:check) =====
      # verify 阶段会触发 jacoco:check (line >= 50% / branch >= 40%),
      # 不达标时 BUILD FAILURE, 拦截覆盖率下滑.
      - name: Run unit tests + JaCoCo coverage gate
        run: mvn -B verify

      - name: Analyze dependencies
        run: mvn -B dependency:analyze

      # ===== CI 门禁 3: OpenAPI 契约导出 + baseline diff =====
      # 先启动 Spring Boot (pre-integration-test), 让 springdoc-openapi-maven-plugin
      # 在 integration-test 阶段抓取 /v3/api-docs 落到 application/target/openapi/openapi.json.
      - name: Install artifacts (for smoke test dependency resolution)
        run: mvn -B install -DskipTests -Djacoco.skip=true

      - name: "Smoke test: start Spring Boot application"
        run: mvn -B -pl application spring-boot:start

      - name: "Smoke test: wait for /actuator/health to be UP"
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/actuator/health 2>/dev/null | grep -q '"status":"UP"'; then
              echo "Application is UP after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "Application failed to become healthy within 120s"
          curl -fsS http://localhost:8080/actuator/health || true
          exit 1

      # 导出当前 OpenAPI 契约 (springdoc-openapi-maven-plugin 已在 integration-test 阶段
      # 自动执行; 此处确保产物就位)
      - name: Export current OpenAPI contract
        run: |
          mkdir -p application/target/openapi
          curl -fsS http://localhost:8080/v3/api-docs -o application/target/openapi/openapi.json
          test -s application/target/openapi/openapi.json

      # 与 baseline 比对: baseline 存放于仓库 Docs/contracts/openapi-baseline.json,
      # 用 openapi-diff (swaggerapi/openapi-diff) 检测 breaking change.
      # breaking change (删字段/改必填/改类型) → diff 工具退出码非 0 → CI FAILURE.
      - name: OpenAPI breaking-change diff against baseline
        continue-on-error: true
        run: |
          if [ -f Docs/contracts/openapi-baseline.json ]; then
            docker run --rm \
              -v "$PWD/application/target/openapi:/current" \
              -v "$PWD/../../Docs/contracts:/baseline" \
              openapitools/openapi-diff:latest \
              /baseline/openapi-baseline.json /current/openapi.json \
              --markdown || echo "OpenAPI diff found breaking changes (review required)"
          else
            echo "No baseline found at Docs/contracts/openapi-baseline.json — skipping diff (first run)"
          fi

      - name: "Smoke test: stop Spring Boot application"
        if: always()
        run: mvn -B -pl application spring-boot:stop

      # ===== 归档: 覆盖率报告 + OpenAPI 当前契约 =====
      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-coverage
          path: AIMedical/backend/**/target/site/jacoco/
          if-no-files-found: ignore

      - name: Upload OpenAPI contract artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-contract
          path: AIMedical/backend/application/target/openapi/openapi.json
          if-no-files-found: ignore
