name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AIMedical/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: AIMedical/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build:all

  backend:
    name: Backend Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AIMedical/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven verify
        run: mvn -B verify

      - name: Analyze dependencies
        run: mvn -B dependency:analyze

      - name: "Smoke test: start Spring Boot application"
        # mvn -B verify 编译/打包/跑单测通过, 但不会真正启动 Spring 上下文.
        # spring-boot:start 会先把 application 模块 repackage, 然后 fork java 进程
        # 启动应用. 若有 bean 装配/循环依赖/缺类等启动期错误, 进程崩溃,
        # spring-boot:start 会超时返回非零, CI 立即失败.
        run: mvn -B -pl application -am package -DskipTests spring-boot:start

      - name: "Smoke test: wait for /actuator/health to be UP"
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/actuator/health 2>/dev/null | grep -q '"status":"UP"'; then
              echo "Application is UP after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "Application failed to become healthy within 120s"
          curl -fsS http://localhost:8080/actuator/health || true
          exit 1

      - name: "Smoke test: stop Spring Boot application"
        if: always()
        run: mvn -B -pl application spring-boot:stop
