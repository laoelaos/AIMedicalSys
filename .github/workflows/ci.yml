name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AIMedical/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: AIMedical/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build:all

  backend:
    name: Backend Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AIMedical/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven verify
        run: mvn -B verify

      - name: Analyze dependencies
        run: mvn -B dependency:analyze
